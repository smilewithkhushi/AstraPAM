services:
  # ── Main Control API ──────────────────────────────────────────────────────
  - type: web
    name: astrapam-api
    runtime: python
    region: oregon
    plan: starter          # upgrade to "standard" (2 GB RAM) if PyTorch OOMs
    buildCommand: pip install --no-deps shap==0.52.0 && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    # Persistent disk — keeps the SQLite DB across restarts/deploys
    # Remove this block if you're okay with the DB resetting on each deploy
    disk:
      name: astrapam-db
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: AEGISPAM_DB
        value: /data/aegispam.db          # stored on the persistent disk above
      - key: CBS_URL
        value: https://astrapam-cbs.onrender.com   # update after CBS service deploys
      - key: ALLOWED_ORIGINS
        value: "*"                         # tighten to your Streamlit URL after deploy
      - key: GRANT_TTL_SECONDS
        value: "300"
      - key: RISK_THRESHOLD_THROTTLE
        value: "0.40"
      - key: RISK_THRESHOLD_STEP_UP
        value: "0.65"
      - key: RISK_THRESHOLD_DENY
        value: "0.80"
      - key: RECON_SLA_SECONDS
        value: "30"

  # ── Mock CBS ──────────────────────────────────────────────────────────────
  - type: web
    name: astrapam-cbs
    runtime: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn mock_cbs:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
